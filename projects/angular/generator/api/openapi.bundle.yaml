openapi: 3.2.0
info:
  title: ERP Gateway API
  version: 0.1.0
  description: Gateway ERP BFF document. Domain route definitions stay in each downstream service spec, and this gateway spec reuses them as the public source of truth.
  license:
    name: Proprietary
    url: https://github.com/edsis/go
servers:
  - url: '{scheme}://{host}'
    description: Configurable gateway endpoint for local, staging, or production environments.
    variables:
      scheme:
        default: http
        enum:
          - http
          - https
      host:
        default: 127.0.0.1:8080
tags:
  - name: Health
    kind: nav
    x-icon: heart-pulse
    description: Gateway monitoring and liveness endpoints.
  - name: Auth
    kind: nav
    x-icon: shield-check
    description: Registration, magic-link authentication, session rotation, and logout endpoints.
  - name: User
    kind: nav
    x-icon: users
    description: User directory and self-service profile endpoints.
  - name: Employee
    kind: nav
    x-icon: briefcase
    description: Gateway-published employee CRUD endpoints exposed under /v1/employee/*.
  - name: Access
    kind: nav
    x-icon: key-round
    description: Gateway-published ACL endpoints exposed under /v1/access/*.
  - name: Approval
    kind: nav
    x-icon: stamp
    description: Gateway-published approval definition and workflow endpoints exposed under /v1/approval/*.
  - name: Role
    parent: Access
    kind: nav
    x-icon: badge-check
    description: Role master data management endpoints.
  - name: Permission
    parent: Access
    kind: nav
    x-icon: key
    description: Permission master data and lookup endpoints.
  - name: Role Permission
    parent: Access
    kind: nav
    x-icon: shield-plus
    description: Role-to-permission assignment endpoints.
  - name: Role User
    parent: Access
    kind: nav
    x-icon: user-cog
    description: Role-to-user assignment endpoints.
  - name: Permission User
    parent: Access
    kind: nav
    x-icon: user-check
    description: User-specific permission assignment endpoints.
  - name: Approval Definition
    parent: Approval
    kind: nav
    x-icon: boxes
    description: Approval definition master data endpoints.
  - name: Approval Transition
    parent: Approval
    kind: nav
    x-icon: arrow-right-left
    description: Approval transition master data endpoints.
  - name: Approval Stage
    parent: Approval
    kind: nav
    x-icon: list-todo
    description: Approval stage master data endpoints.
  - name: Approval Actor
    parent: Approval
    kind: nav
    x-icon: users
    description: Approval actor master data endpoints.
  - name: Approval Instance
    parent: Approval
    kind: nav
    x-icon: clipboard-check
    description: Approval workflow submit, decision, detail, and pending endpoints.
  - name: Storage
    kind: nav
    x-icon: hard-drive
    description: File upload, metadata, and signed URL endpoints for GCS and S3.
  - name: GCS
    parent: Storage
    kind: nav
    x-icon: cloud
    description: Google Cloud Storage upload and object access endpoints.
  - name: S3
    parent: Storage
    kind: nav
    x-icon: database-backup
    description: AWS S3 (and S3-compatible) upload and object access endpoints.
paths:
  /health:
    get:
      tags:
        - Health
      summary: Gateway health check
      description: Returns the gateway service status and request metadata for monitoring.
      operationId: getGatewayHealth
      security: []
      responses:
        '200':
          description: Gateway is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: gateway is healthy
                  data:
                    type: object
                    properties:
                      service:
                        type: string
                        example: gateway-erp
                      status:
                        type: string
                        example: ok
                      timestamp:
                        type: string
                        format: date-time
                      request_id:
                        type: string
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1:
    get:
      tags:
        - Health
      summary: Gateway API root probe
      description: Returns no content when the versioned gateway API group is reachable.
      operationId: getGatewayAPIRoot
      security: []
      responses:
        '204':
          description: Gateway API root is reachable
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/register:
    post:
      tags:
        - Auth
      summary: Register a new principal
      description: Creates a new principal record and returns the registered user summary.
      operationId: registerAuthPrincipal
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRegisterRequest'
            examples:
              default:
                $ref: '#/components/examples/AuthRegisterRequestExample'
      responses:
        '201':
          description: Principal registered
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthUserResponse'
              examples:
                default:
                  $ref: '#/components/examples/AuthRegisterSuccessExample'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_payload:
                  $ref: '#/components/examples/AuthInvalidPayloadExample'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/login:
    post:
      tags:
        - Auth
      summary: Send a magic login link
      description: Requests a single-use magic link. The backend may send either a login link or an activation link depending on the account state.
      operationId: requestMagicLoginLink
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthLoginRequest'
            examples:
              default:
                $ref: '#/components/examples/AuthLoginRequestExample'
      responses:
        '200':
          description: Magic link sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MagicLinkDispatchResponse'
              examples:
                default:
                  $ref: '#/components/examples/MagicLinkDispatchSuccessExample'
        '401':
          description: Unknown email address
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                unauthorized:
                  $ref: '#/components/examples/AuthUnauthorizedExample'
        '422':
          description: Account status is not eligible for login or activation email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                activation_unavailable:
                  $ref: '#/components/examples/AuthBusinessRuleExample'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/resend:
    post:
      tags:
        - Auth
      summary: Resend a magic link
      description: Sends a replacement single-use magic link using the same decision flow as the login endpoint. Callers may override the frontend destination URL per request.
      operationId: resendMagicLink
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthResendRequest'
            examples:
              default:
                $ref: '#/components/examples/AuthResendRequestExample'
      responses:
        '200':
          description: Magic link resent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MagicLinkDispatchResponse'
              examples:
                default:
                  $ref: '#/components/examples/MagicLinkResendSuccessExample'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_payload:
                  $ref: '#/components/examples/AuthInvalidPayloadExample'
        '422':
          description: Account status is not eligible for login or activation email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                activation_unavailable:
                  $ref: '#/components/examples/AuthBusinessRuleExample'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/verify:
    post:
      tags:
        - Auth
      summary: Verify a single-use magic link token
      description: Consumes a magic link token, activates eligible accounts when needed, returns an access token, and sets the refresh_token cookie with HttpOnly and SameSite protection.
      operationId: verifyMagicLink
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthVerifyRequest'
            examples:
              default:
                $ref: '#/components/examples/AuthVerifyRequestExample'
      responses:
        '200':
          description: Magic link consumed, access token issued, and refresh cookie set
          headers:
            Set-Cookie:
              description: HttpOnly refresh_token cookie for the current session.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
              examples:
                default:
                  $ref: '#/components/examples/AuthVerifySuccessExample'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_payload:
                  $ref: '#/components/examples/AuthVerifyInvalidPayloadExample'
        '401':
          description: Invalid, expired, or already-consumed token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_token:
                  $ref: '#/components/examples/AuthUnauthorizedExample'
        '422':
          description: Account not eligible for activation or login
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                email_not_verified:
                  $ref: '#/components/examples/AuthVerifyBusinessRuleExample'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/refresh:
    post:
      tags:
        - Auth
      summary: Rotate the refresh cookie
      description: Validates the current HttpOnly refresh_token cookie, rotates the token family, returns a new access token, and sets a replacement refresh_token cookie.
      operationId: refreshAuthToken
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Session rotated and refresh cookie replaced
          headers:
            Set-Cookie:
              description: Replacement HttpOnly refresh_token cookie.
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'
              examples:
                default:
                  $ref: '#/components/examples/AuthRefreshSuccessExample'
        '401':
          description: Missing, invalid, expired, or already-reused refresh_token cookie
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_refresh_token:
                  $ref: '#/components/examples/AuthInvalidRefreshTokenExample'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/auth/logout:
    post:
      tags:
        - Auth
      summary: Revoke the current session
      description: Revokes the refresh-token family for the current HttpOnly refresh_token cookie when available and clears that cookie in the response.
      operationId: logoutAuthSession
      security:
        - cookieAuth: []
      responses:
        '200':
          description: Session revoked and refresh cookie cleared
          headers:
            Set-Cookie:
              description: Expired refresh_token cookie clearing the browser session.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: logout success
                  data:
                    type: object
                    properties:
                      revoked:
                        type: boolean
                        example: true
              examples:
                default:
                  $ref: '#/components/examples/AuthLogoutSuccessExample'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/user:
    get:
      tags:
        - User
      summary: List users
      description: Returns a paginated user list. Access is protected by gateway ACL and may be further restricted by service-layer rules. `user:user:list:all` grants global listing, while `user:user:list:scoped` currently resolves through a dedicated scope resolver whose default behavior still limits results to the authenticated actor until richer scope relations are introduced.
      operationId: listUsers
      security:
        - callerAuth: []
      x-required-permissions:
        - user:user:list:all
        - user:user:list:scoped
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - created_at
              - name
              - email
              - role
              - status
        - $ref: '#/components/parameters/OrderQuery'
        - $ref: '#/components/parameters/SearchQuery'
      responses:
        '200':
          description: User list retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserListResponse'
              examples:
                default:
                  $ref: '#/components/examples/UserListSuccessExample'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '403':
          description: Missing required user listing permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  $ref: '#/components/examples/UserListForbiddenExample'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    post:
      tags:
        - User
      summary: Create user
      description: Creates a new user profile with an initial role assignment.
      operationId: createUser
      security:
        - callerAuth: []
      x-required-permissions:
        - user:user:create
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreateRequest'
            examples:
              default:
                $ref: '#/components/examples/UserCreateRequestExample'
      responses:
        '201':
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdateResponse'
              examples:
                default:
                  $ref: '#/components/examples/UserCreateSuccessExample'
        '400':
          description: Invalid payload or duplicate email
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_payload:
                  $ref: '#/components/examples/UserInvalidPayloadExample'
                duplicate_email:
                  $ref: '#/components/examples/UserDuplicateEmailExample'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '403':
          description: Missing user:user:create permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  $ref: '#/components/examples/UserCreateForbiddenExample'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/user/{id}/active:
    patch:
      tags:
        - User
      summary: Activate a user
      description: Updates the target user status to active when the business transition is allowed.
      operationId: patchUserActive
      security:
        - callerAuth: []
      x-required-permissions:
        - user:user:active
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User status updated to active
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMutationResponse'
              examples:
                default:
                  $ref: '#/components/examples/UserActivateSuccessExample'
        '400':
          description: Invalid user identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalid_identifier:
                  $ref: '#/components/examples/UserInvalidIdentifierExample'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '403':
          description: Missing user:user:active permission
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                forbidden:
                  $ref: '#/components/examples/UserActiveForbiddenExample'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/user/{id}:
    get:
      tags:
        - User
      summary: Get user detail
      description: Returns a single user detail record. Service-layer ownership rules may still deny access even when the gateway permission check passes.
      operationId: getUserByID
      security:
        - callerAuth: []
      x-required-permissions:
        - user:user:read
      x-authorization-notes:
        - Requires service-layer ownership checks for non-privileged users.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User detail retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdateResponse'
        '400':
          description: Invalid user identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '403':
          description: Missing user:user:read permission or forbidden by ownership rule
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - User
      summary: Update any user profile
      description: Partially updates another user's profile. Intended for privileged roles with broad update access.
      operationId: patchUserByID
      security:
        - callerAuth: []
      x-required-permissions:
        - user:user:update:all
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateRequest'
      responses:
        '200':
          description: User profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdateResponse'
        '400':
          description: Invalid payload or identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '403':
          description: Missing user:user:update:all permission
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    delete:
      tags:
        - User
      summary: Reject physical user deletion
      description: This route remains registered for contract completeness, but user-service intentionally does not support physical deletion and always returns method not allowed.
      operationId: deleteUserByID
      security:
        - callerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '405':
          description: User delete is not supported
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                default:
                  $ref: '#/components/examples/UserDeleteNotAllowedExample'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/user/me:
    get:
      tags:
        - User
      summary: Get current user detail
      description: Returns the authenticated user's own profile.
      operationId: getCurrentUser
      security:
        - callerAuth: []
      x-required-permissions:
        - user:user:read
      responses:
        '200':
          description: Current user detail retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdateResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '403':
          description: Missing user:user:read permission
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
    patch:
      tags:
        - User
      summary: Update authenticated user profile
      description: Partially updates the authenticated user's own profile using the self-update permission.
      operationId: patchCurrentUser
      security:
        - callerAuth: []
      x-required-permissions:
        - user:user:update:own
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserSelfUpdateRequest'
      responses:
        '200':
          description: Current user profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserUpdateResponse'
        '400':
          description: Invalid payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '403':
          description: Missing user:user:update:own permission
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/user/{id}/suspend:
    patch:
      tags:
        - User
      summary: Suspend a user
      description: Updates the target user status to suspend when the business transition is allowed.
      operationId: patchUserSuspend
      security:
        - callerAuth: []
      x-required-permissions:
        - user:user:suspend
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User status updated to suspend
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMutationResponse'
        '400':
          description: Invalid user identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '403':
          description: Missing user:user:suspend permission
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/user/{id}/reset:
    patch:
      tags:
        - User
      summary: Reset a user state
      description: Updates the target user status to reset when the business transition is allowed.
      operationId: patchUserReset
      security:
        - callerAuth: []
      x-required-permissions:
        - user:user:reset
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: User status updated to reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserMutationResponse'
        '400':
          description: Invalid user identifier
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '403':
          description: Missing user:user:reset permission
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '422':
          $ref: '#/components/responses/BusinessRuleViolation'
        '429':
          $ref: '#/components/responses/TooManyRequests'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/employee:
    get:
      tags:
        - Employee
      summary: List employees
      description: Returns a paginated employee list filtered by search text and sorted by supported employee fields.
      operationId: listEmployees
      security:
        - callerAuth: []
      x-required-permissions:
        - employee:employee:list
      parameters:
        - $ref: '#/components/parameters/PageQuery'
        - $ref: '#/components/parameters/LimitQuery'
        - name: sort
          in: query
          schema:
            type: string
            enum:
              - created_at
              - full_name
              - employee_number
              - email
              - hire_date
              - employment_status
        - $ref: '#/components/parameters/OrderQuery'
        - $ref: '#/components/parameters/SearchQuery'
      responses:
        '200':
          description: Employee list retrieved
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EmployeeListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '403':
          description: Missing employee:employee:list permission
          content:
            application/json:
              schema:
