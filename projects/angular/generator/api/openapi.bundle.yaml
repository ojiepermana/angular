  parameters:
    PageQuery:
      name: page
      in: query
      description: 1-based page number.
      schema:
        type: integer
        minimum: 1
        example: 1
    LimitQuery:
      name: limit
      in: query
      description: Number of items returned per page.
      schema:
        type: integer
        minimum: 1
        maximum: 100
        example: 20
    OrderQuery:
      name: order
      in: query
      description: Sort direction.
      schema:
        type: string
        enum:
          - asc
          - desc
        example: desc
    SearchQuery:
      name: search
      in: query
      description: Free-text search term.
      schema:
        type: string
        example: admin
