  /v1/storage/gcs:
    post:
      tags:
        - GCS
      summary: Upload file to GCS
      description: |
        Uploads a file to Google Cloud Storage. The object key is derived as:
        `{path}/{YYYY}/{MonthName}/{DD}/{id}.{ext}`
      operationId: uploadGCS
      security:
        - callerAuth: []
      x-required-permissions:
        - storage:gcs:upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - id
                - path
                - date
                - object
              properties:
                id:
                  type: string
                  format: uuid
                  description: UUIDv7 identifier for the object.
                  example: 01956b8e-0000-7000-8000-000000000000
                path:
                  type: string
                  description: Storage path prefix. Must not contain '..'.
                  example: docs/invoice
                date:
                  type: string
                  format: date
                  description: Date in YYYY-MM-DD format used to build the object key.
                  example: '2022-01-02'
                compress:
                  type: boolean
                  default: false
                  description: If true, compresses the uploaded image (PNG or JPEG). Only valid for image/* content.
                object:
                  type: string
                  format: binary
                  description: File to upload. Maximum 32 MB.
      responses:
        '200':
          description: Object uploaded successfully.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageUploadResponse'
        '400':
          description: Validation error (missing or invalid fields).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '422':
          description: Compress requested on non-image object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/storage/gcs/object:
    get:
      tags:
        - GCS
      summary: Get GCS object metadata and signed URL
      description: |
        Returns metadata for a GCS object and a 15-minute read-only signed URL.
      operationId: getObjectGCS
      security:
        - callerAuth: []
      x-required-permissions:
        - storage:gcs:read
      parameters:
        - name: key
          in: query
          required: true
          description: URL-encoded object key. Must not contain '..'.
          schema:
            type: string
          example: docs%2Finvoice%2F2022%2FJanuary%2F02%2F01956b8e.pdf
      responses:
        '200':
          description: Object metadata and signed URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StorageObjectResponse'
        '400':
          description: Missing or invalid key parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
  /v1/storage/gcs/object/download:
    get:
      tags:
        - GCS
      summary: Download GCS object via signed URL redirect
      description: |
        Generates an attachment signed URL and responds with a 307 redirect.
        The browser will download the file with Content-Disposition: attachment.
      operationId: downloadObjectGCS
      security:
        - callerAuth: []
      x-required-permissions:
        - storage:gcs:read
      parameters:
        - name: key
          in: query
          required: true
          description: URL-encoded object key. Must not contain '..'.
          schema:
            type: string
      responses:
        '307':
          description: Temporary redirect to the signed download URL.
          headers:
            Location:
              schema:
                type: string
                format: uri
        '400':
          description: Missing or invalid key parameter.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedCaller'
        '404':
          $ref: '#/components/responses/ResourceNotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'
