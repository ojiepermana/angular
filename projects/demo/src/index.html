<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Demo</title>
    <base href="/" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=optional" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=optional" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&family=Quicksand:wght@400;500;600&display=swap" />
    <script>
      (() => {
        const allowedColors = ['blue', 'red', 'green', 'purple', 'amber'];
        const allowedStyles = ['default', 'sharp', 'brutal', 'soft'];
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

        try {
          const storedMode = window.localStorage.getItem('theme-mode');
          const storedColor = window.localStorage.getItem('theme-color');
          const storedStyle = window.localStorage.getItem('theme-style');
          const resolvedMode =
            storedMode === 'light' || storedMode === 'dark' ? storedMode : prefersDark ? 'dark' : 'light';
          const resolvedColor = allowedColors.includes(storedColor ?? '') ? storedColor : 'blue';
          const resolvedStyle = allowedStyles.includes(storedStyle ?? '') ? storedStyle : 'default';
          const root = document.documentElement;

          root.dataset.mode = resolvedMode;
          root.dataset.color = resolvedColor;
          root.dataset.style = resolvedStyle;
          root.dataset.theme = resolvedColor;
          root.classList.toggle('dark', resolvedMode === 'dark');
        } catch {
          const root = document.documentElement;

          root.dataset.mode = prefersDark ? 'dark' : 'light';
          root.dataset.color = 'blue';
          root.dataset.style = 'default';
          root.dataset.theme = 'blue';
          root.classList.toggle('dark', prefersDark);
        }
      })();
    </script>
  </head>
  <body>
    <app-root></app-root>
  </body>
</html>
